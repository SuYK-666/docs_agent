name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough details to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce.
      placeholder: |
        1. Run command ...
        2. Upload file ...
        3. Observe error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant logs. Remove secrets before sharing.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main / commit SHA / release tag
  - type: input
    id: os
    attributes:
      label: OS and Python
      placeholder: Windows 11 + Python 3.12
