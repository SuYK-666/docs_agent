name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Static compile check
        run: |
          python -m compileall main.py ingestion core_agent "tools_&_rag" "output_&_delivery"
