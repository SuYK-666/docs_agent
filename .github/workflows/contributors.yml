name: Generate Contributors Image

on:
  push:
    branches:
      - main # 当 main 分支有代码提交时触发
  schedule:
    - cron: '0 0 * * *' # 每天半夜自动跑一次，防止漏掉

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须要有写入权限，才能把生成的图片传回仓库

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录，确保贡献者统计准确

      - name: Generate Contributors SVG
        uses: jaywcjlove/github-action-contributors@main
        with:
          # 过滤掉机器人账号，保持版面干净
          filter-author: (renovate\[bot\]|dependabot\[bot\]|github-actions\[bot\])
          avatarSize: 44
          # 图片生成的本地路径
          output: contributors.svg
          commit-message: "chore: auto update contributors image"
