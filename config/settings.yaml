app:
  environment: dev
  timezone: Asia/Shanghai
  log_level: INFO
  max_parallel_docs: 10
  max_parallel_tasks: 10

paths:
  raw_docs_dir: data_workspace/raw_docs
  processed_cache_dir: data_workspace/processed_cache
  rag_db_dir: data_workspace/rag_db
  final_reports_dir: data_workspace/final_reports

spiders:
  enabled: false
  auto_run: false
  default_site: sample_notice_site
  timeout_seconds: 20
  verify_ssl: false
  force_encoding: ""
  history_file: data_workspace/history_urls.json
  retry:
    max_retries: 3
    backoff_base_seconds: 2
  humanize:
    sleep_min_seconds: 1.5
    sleep_max_seconds: 3.5
    user_agents: []
  playwright:
    headless: true
    browser_channel: ""
    wait_network_idle: true
    wait_selector_timeout_seconds: 15
  auth:
    storage_state_file: data_workspace/cookies/spider_state.json
    allow_manual_login: false
    manual_login_timeout_seconds: 120
    login_url_keywords: ["login", "cas", "oauth", "sso"]
    login_title_keywords: ["登录", "统一身份认证", "身份认证", "扫码"]
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
  sites:
    sample_notice_site:
      list_url: https://example.edu.cn/notice
      list_selector: .news-list li a
      title_selector: .article-title
      content_selector: .article-content
      attachment_selector: a[href$='.pdf'], a[href$='.doc'], a[href$='.docx'], a[href$='.xls'], a[href$='.xlsx']

rag:
  enabled: true
  top_k: 3
  similarity_threshold: 0.75
  query_text_chars: 1000
  collection_name: docs_agent_archive
  embedding_model: BAAI/bge-small-zh
  prewarm_reranker: true
  rerank_candidates: 9
  fallback_enabled: true
  metadata_json_max_chars: 0
  dynamic_threshold:
    enabled: true
    short_query_chars: 320
    long_query_chars: 1200
    short_query_bonus: 0.05
    long_query_penalty: 0.03
    min: 0.70
    max: 0.90

logging:
  dir: log
  config_file: log/logging.yaml
  file: ""

