llm:
  provider: tongyi
  providers:
    tongyi:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-max
      request_json_mode: true
      timeout_seconds: 60
      max_output_tokens: 1500

reader:
  summary_target_words: 250
  json_retry_times: 3
  max_output_tokens: 2200
  include_source_anchors: true

reviewer:
  json_retry_times: 1
  max_output_tokens: 8192

critic:
  enabled: true
  score_threshold: 85
  max_rework_loops: 3
  json_retry_times: 2
  max_output_tokens: 1200

dispatcher:
  json_retry_times: 1

orchestrator:
  enable_reviewer: true
  enable_dispatcher: true
  generate_calendar: true

security_filter:
  enabled: true

urgency:
  high_threshold: 70
  medium_threshold: 40

calendar:
  calendar_name: 公文任务日程
  save_to_final_reports: true

email:
  enabled: true
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  sender_email: "1774006384@qq.com"
  sender_name: "公文速阅智能体"
  auth_code: "xdtjungwkcjrbbdf"
  timeout_seconds: 30

contacts:
  "各学院": "target_email_1@xxx.com"
  "各部门": "target_email_2@xxx.com"
  "默认": "your_test_email@xxx.com"

ingestion:
  router:
    pdf_mode: auto
    pdf_text_page_ratio_threshold: 0.6
    pdf_text_total_chars_threshold: 180

  ocr:
    lang: ch
    use_angle_cls: true
    dpi: 240
    engine: rapid
    allow_fallback: true
    max_parallel_files: 10

  # VLM-assisted OCR is integrated into main ingestion flow.
  # It reuses the same selected LLM provider and API key; no extra key is required.
  vlm_assist:
    enabled: true
    max_parallel_pages: 2
    max_output_tokens: 2400
    temperature: 0
    # Optional forced VLM model for all providers. Empty means auto-detect.
    default_model: ""
    providers:
      tongyi:
        model: qwen-vl-max
      wenxin:
        model: ernie-4.5-vl-32k
      doubao:
        model: doubao-vision-pro-32k
      zhipu:
        model: glm-4v-plus

  layout:
    score_threshold: 0.35
    top_right_filter: true
    top_region_ratio: 0.18
    right_region_ratio: 0.62
    header_keywords:
      - 机密
      - 秘密
      - 绝密
      - 签发
      - 发文字号
      - 编号
      - 红头
    stamp_filter: true
    stamp_keywords:
      - 公章
      - 印
      - 章
    stamp_noise_keywords:
      - 仅供内部留存
      - 内部留存
      - 仅供
      - 作废
    two_column_min_blocks: 8
    two_column_min_each_side: 3
    two_column_gap_ratio: 0.22
    merge_line_gap_ratio: 1.45
    merge_x_tolerance_ratio: 0.10